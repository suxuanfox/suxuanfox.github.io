<div id="study-box">

  <!-- 左上角标题 -->
  <div class="study-title">今日查补</div>

  <!-- 中间课程 -->
  <div id="today-course" class="study-course"></div>

  <!-- 右下角信息 -->
  <div class="bottom-info">
    <div id="yesterday"></div>
    <div id="tomorrow"></div>
    <div id="cycle-count"></div>
  </div>

</div>

<style>
#study-box{
  width:20%;
  max-width:500px;
  margin:20px auto;
  border:none;
  box-shadow:none;
  padding:24px;
  background: #ffffff;
  position:relative;
  
}

/* 左上角标题 */
.study-title{
  position:absolute;
  top:12px;
  left:16px;
  font-size:14px;
  color:#666;
}

/* 中间课程 */
.study-course{
  display:flex;
  justify-content:center;
  align-items:center;
  height:90px;
  font-size:28px;
  font-weight:600;
}

/* 右下角容器 */
.bottom-info{
  position:absolute;
  right:16px;
  bottom:16px;
  text-align:right;   /* 右对齐 */
  font-size:13px;
  color:#777;
  line-height:1.4;    /* 控制垂直间距 */
}

/* 已持续周期单独调整 */
#cycle-count{
  margin-top:2px;      /* 可调间距 */
  color:#888;
  font-size:13px;
}
</style>

<script>
function updateStudyCourse(){

  const courses=["随机分析","线性泛函","微分流形"];

  const start=new Date("2026-03-11");
  const today=new Date();

  const diff=Math.floor((today-start)/(1000*60*60*24));
  const index=(diff%3+3)%3;
  const cycles=Math.floor(diff/3);

  const yesterdayIndex=(index+2)%3;
  const tomorrowIndex=(index+1)%3;

  document.getElementById("today-course").innerText = courses[index];
  document.getElementById("yesterday").innerText = "昨日：" + courses[yesterdayIndex];
  document.getElementById("tomorrow").innerText = "明日：" + courses[tomorrowIndex];
  document.getElementById("cycle-count").innerText = "已持续 " + cycles + " 个周期";
}

updateStudyCourse();
</script>
