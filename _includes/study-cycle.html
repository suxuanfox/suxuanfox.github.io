<div id="study-box">

<div class="study-title">今日查补</div>

<div id="today-course" class="study-course"></div>

<div id="cycle-count" class="cycle-count"></div>

</div>

<style>

#study-box{
width:100%;
max-width:800px;
margin:20px auto;
border:1px solid #e5e5e5;
border-radius:12px;
padding:24px;
background:#ffffff;
position:relative;

/* 阴影 */
box-shadow:0 8px 24px rgba(0,0,0,0.08);

}

.study-title{
position:absolute;
top:12px;
left:16px;
font-size:14px;
color:#666;
}

.study-course{
display:flex;
justify-content:center;
align-items:center;
height:90px;
font-size:28px;
font-weight:600;
}

.cycle-count{
text-align:center;
font-size:14px;
color:#888;
margin-top:6px;
}

</style>

<script>

function updateStudyCourse(){

const courses=[
"随机分析",
"线性泛函",
"微分流形"
]

const start=new Date("2026-03-11")

const today=new Date()

const diff=Math.floor((today-start)/(1000*60*60*24))

const index=(diff%3+3)%3

const cycles=Math.floor(diff/3)

document.getElementById("today-course").innerText=courses[index]

document.getElementById("cycle-count").innerText=
"已持续 "+cycles+" 个周期"

}

updateStudyCourse()

</script>
